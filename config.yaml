project:
  name: "Fistula-Net"
  seed: 42
  institution_code: "SCPH"
  study_code: "AFMRI"
  execution_id: "FN-2026-05"

data:
  output_dir: "outputs"
  case_count: 8
  volume_shape: [48, 48, 28]
  voxel_spacing_mm: [1.0, 1.0, 1.2]
  modalities:
    - axial_t2w
    - coronal_t2w
    - t2_fs_stir
    - post_contrast_t1_fs
    - dwi_adc
  case_pattern:
    - low_intersphincteric
    - transsphincteric_eas_crossing
    - abscess_associated_branching
    - horseshoe_recurrent

model:
  input_channels: 5
  base_channels: 18
  bottleneck_channels: 96
  topology_channels: 8
  segmentation_channels: 7
  graph_hidden_dim: 64
  attention_heads: 4
  dropout: 0.12
  thresholds:
    tract: 0.48
    centerline: 0.46
    branch: 0.55
    abscess: 0.52
    crossing: 0.50

evaluation:
  bootstrap_iterations: 700
  paper_aligned_metrics:
    full_model:
      tract_dice: 0.84
      abscess_dice: 0.88
      eas_dice: 0.91
      hd95_mm: 5.2
      centerline_dice: 0.82
      branch_f1: 0.80
      io_error_mm: 4.6
      eas_mae_pct: 7.8
      class_f1: 0.87
    baseline_models:
      - model: "3D U-Net"
        tract_dice: 0.71
        abscess_dice: 0.78
        eas_dice: 0.86
        hd95_mm: 8.9
        centerline_dice: 0.61
